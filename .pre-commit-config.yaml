repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses YAML tags like !ENV; skip it for check-yaml.
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy runs in the project's uv venv so it sees the installed package and
  # all dev deps. An isolated mypy env (mirrors-mypy) can't find pytest stubs
  # or the editable zsnoop_mcp install.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (via uv)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
