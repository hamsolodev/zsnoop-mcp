name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    # UV_PYTHON forces uv to use this exact Python version for `uv sync`
    # and `uv run` instead of defaulting to the lowest `requires-python`
    # compatible interpreter (which used to mean every matrix job ran on
    # 3.11 regardless of label — see commit history).
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Confirm Python version used by uv
        # Belt-and-braces: print the active Python so future matrix-misfires
        # are visible in the log instead of silent like the first time.
        run: uv run python --version

      - name: ruff check
        run: uv run ruff check

      - name: ruff format (check only)
        run: uv run ruff format --check

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q

      - name: pip-audit (CVE scan of locked deps)
        run: uv run pip-audit --skip-editable

  docs:
    name: docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync docs dependencies
        run: uv sync --group docs

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict
