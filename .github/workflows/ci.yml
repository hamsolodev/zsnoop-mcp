name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check

      - name: ruff format (check only)
        run: uv run ruff format --check

      - name: mypy
        run: uv run mypy

      - name: pytest
        run: uv run pytest -q

      - name: pip-audit (CVE scan of locked deps)
        run: uv run pip-audit --skip-editable

  docs:
    name: docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync docs dependencies
        run: uv sync --group docs

      - name: mkdocs build --strict
        run: uv run mkdocs build --strict
